# ============================================================================
# Alembic Configuration - AI Trend Monitor
# ============================================================================
# The database URL is set programmatically in alembic/env.py from the
# application settings (POSTGRES_* environment variables), so the
# sqlalchemy.url below is intentionally left blank.
#
# Run migrations:
#   alembic upgrade head              # Apply all pending migrations
#   alembic revision --autogenerate -m "description"  # Generate a migration
#   alembic downgrade -1              # Roll back one migration
#   alembic history                   # Show migration history
# ============================================================================

[alembic]
# Path to migration scripts.
script_location = alembic

# Template used to generate migration file names.
# Produces: YYYY-MM-DD_HHMM_<rev>_<slug>.py
file_template = %%(year)d-%%(month).2d-%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Truncate long revision identifiers in filenames.
truncate_slug_length = 40

# Set to 'true' to run the environment during the 'revision' command,
# regardless of autogenerate.
# revision_environment = false

# Set to 'true' to allow .hierarchies in generated revisions.
# prepend_sys_path = .

# Timezone to use when rendering the date within the migration file.
timezone = UTC

# The database URL is injected from app.config in env.py.
# Leave this empty; it is overridden at runtime.
sqlalchemy.url =

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
