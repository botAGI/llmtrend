# ============================================================================
# AI Trend Monitor - Development Overrides
# ============================================================================
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up
#
# This overlay adds:
#   - Hot-reload via volume mounts for all application code
#   - Debug log levels
#   - Exposed ports for Postgres and Redis (for local tooling)
#   - Reduced concurrency for lower resource usage
# ============================================================================

services:

  api:
    build:
      target: api
    volumes:
      - ./app:/app/app
      - ./scripts:/app/scripts
      - ./alembic:/app/alembic
      - reports_data:/app/reports
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      APP_ENV: development
      APP_DEBUG: "true"
      APP_LOG_LEVEL: DEBUG

  worker:
    volumes:
      - ./app:/app/app
    command: celery -A app.tasks worker --loglevel=debug --concurrency=1
    environment:
      APP_LOG_LEVEL: DEBUG

  scheduler:
    volumes:
      - ./app:/app/app
    environment:
      APP_LOG_LEVEL: DEBUG

  dashboard:
    volumes:
      - ./dashboard:/app/dashboard
    environment:
      STREAMLIT_API_BASE_URL: http://api:8000

  telegram-bot:
    volumes:
      - ./bot:/app/bot

  postgres:
    ports:
      - "${POSTGRES_EXTERNAL_PORT:-5432}:5432"

  redis:
    ports:
      - "${REDIS_EXTERNAL_PORT:-6379}:6379"
