# ============================================================================
# AI Trend Monitor - Production Docker Compose
# ============================================================================
# Usage:
#   cp .env.example .env        # Edit with real values
#   docker compose up -d        # Start all services
#   docker compose logs -f api  # Follow API logs
# ============================================================================

version: "3.8"

services:

  # ── Data stores ──────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ai_trends}
      POSTGRES_USER: ${POSTGRES_USER:-monitor}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_in_production}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-monitor} -d ${POSTGRES_DB:-ai_trends}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - monitor-net
    restart: unless-stopped
    mem_limit: 512m

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 200mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - monitor-net
    restart: unless-stopped
    mem_limit: 256m

  # ── Application services ────────────────────────────────────────────────

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    ports:
      - "${APP_PORT:-8000}:8000"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    volumes:
      - reports_data:/app/reports
    networks:
      - monitor-net
    restart: unless-stopped
    mem_limit: 512m

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: worker
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - reports_data:/app/reports
    networks:
      - monitor-net
    restart: unless-stopped
    mem_limit: 1g

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
      target: scheduler
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - monitor-net
    restart: unless-stopped
    mem_limit: 256m

  # ── Frontend & bot ──────────────────────────────────────────────────────

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    ports:
      - "${DASHBOARD_PORT:-8501}:8501"
    env_file: .env
    environment:
      STREAMLIT_API_BASE_URL: http://api:8000
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - monitor-net
    restart: unless-stopped
    mem_limit: 512m

  telegram-bot:
    build:
      context: .
      dockerfile: Dockerfile.bot
    env_file: .env
    environment:
      API_BASE_URL: http://api:8000
    depends_on:
      api:
        condition: service_healthy
    networks:
      - monitor-net
    restart: unless-stopped
    mem_limit: 256m
    # The bot will exit gracefully if TELEGRAM_BOT_TOKEN is empty.

  # ── AI inference ────────────────────────────────────────────────────────

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
      - ./scripts/ollama-entrypoint.sh:/entrypoint.sh:ro
    entrypoint: ["/bin/bash", "/entrypoint.sh"]
    environment:
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.1:8b}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - monitor-net
    restart: unless-stopped
    mem_limit: 8g
    # GPU support (NVIDIA): uncomment the deploy section below.
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

# ── Volumes ─────────────────────────────────────────────────────────────────

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  reports_data:
    driver: local
  ollama_data:
    driver: local

# ── Networks ────────────────────────────────────────────────────────────────

networks:
  monitor-net:
    driver: bridge
